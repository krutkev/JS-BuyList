<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BuyList</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main class="container">
        <section class="left-panel">
            <form class="add-item-form">
                <input type="text" placeholder="Назва товару">
                <button type="button" class="btn btn-primary" data-tooltip="Додати новий товар">Додати</button>
            </form>
            <ul class="item-list">
                <li class="item">
                    <span class="item-name crossed">Помідори</span>
                    <div class="item-controls">
                        <span class="quantity-badge">2</span>
                    </div>
                    <div class="item-actions">
                        <button type="button" class="btn btn-default" data-tooltip="Позначити як не куплене">Не куплено</button>
                    </div>
                </li>
                <li class="item">
                    <span class="item-name">Печиво</span>
                    <div class="item-controls">
                        <button type="button" class="btn btn-danger-circle" data-tooltip="Зменшити кількість">−</button>
                        <span class="quantity-badge">2</span>
                        <button type="button" class="btn btn-success-circle" data-tooltip="Збільшити кількість">+</button>
                    </div>
                    <div class="item-actions">
                        <button type="button" class="btn btn-default" data-tooltip="Позначити як куплене">Куплено</button>
                        <button type="button" class="btn btn-danger-square" data-tooltip="Видалити товар">×</button>
                    </div>
                </li>
                <li class="item">
                    <input type="text" class="item-edit-input" value="Сир">
                    <div class="item-controls">
                        <button type="button" class="btn btn-danger-circle disabled" data-tooltip="Мінімум 1" disabled>−</button>
                        <span class="quantity-badge">1</span>
                        <button type="button" class="btn btn-success-circle" data-tooltip="Збільшити кількість">+</button>
                    </div>
                    <div class="item-actions">
                        <button type="button" class="btn btn-default" data-tooltip="Позначити як куплене">Куплено</button>
                        <button type="button" class="btn btn-danger-square" data-tooltip="Видалити товар">×</button>
                    </div>
                </li>
            </ul>
        </section>
        <aside class="right-panel">
            <div class="stats-card">
                <h2>Залишилося</h2>
                <hr>
                <div class="tags-container">
                    <span class="tag">Печиво <span class="tag-count">2</span></span>
                    <span class="tag">Сир <span class="tag-count">1</span></span>
                </div>
            </div>
            <div class="stats-card">
                <h2>Куплено</h2>
                <hr>
                <div class="tags-container">
                    <span class="tag crossed">Помідори <span class="tag-count">2</span></span>
                </div>
            </div>
        </aside>
    </main>
    <div class="student-badge">
		<span class="badge-title">Buy List</span>
		<span class="badge-created-by">Created by:</span>
		<span class="badge-author">Krutkevych Ivan</span>
	</div>
</body>
</html>
